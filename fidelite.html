<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fidélité — Ciseaux</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf3ef;color:#3d2b27;min-height:100vh;padding-bottom:4rem}
header{background:linear-gradient(135deg,#b87c6e,#9c5f52);color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:20}
.back{color:#fff;text-decoration:none;font-size:1.3rem;opacity:.85}
.back:hover{opacity:1}
h1{font-size:1.08rem;font-weight:800;flex:1}
.cfg-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:.4rem .8rem;border-radius:16px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:inherit}
main{padding:1.1rem;max-width:620px;margin:0 auto}
/* Recherche rapide */
.search-box{background:#fff;border-radius:16px;padding:1.1rem 1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1.1rem}
.search-box h2{font-size:.9rem;font-weight:700;color:#b87c6e;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.05em}
.search-box input{width:100%;border:1.5px solid #e8c5b8;border-radius:10px;padding:.62rem .9rem;font-size:.95rem;color:#3d2b27;outline:none;background:#fdf8f5;font-family:inherit;transition:border-color .15s}
.search-box input:focus{border-color:#b87c6e;background:#fff}
.results{margin-top:.6rem}
.res-item{padding:.55rem .7rem;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:.6rem;transition:background .12s}
.res-item:hover{background:#f5ebe7}
.res-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e8c5b8,#d4a598);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#8a4a40;flex-shrink:0}
/* Client actif */
.client-panel{background:#fff;border-radius:18px;padding:1.3rem 1.4rem;box-shadow:0 2px 14px rgba(0,0,0,.07);margin-bottom:1.1rem;display:none}
.cp-head{display:flex;align-items:center;gap:.9rem;margin-bottom:1rem}
.cp-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#e8c5b8,#c4867a);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0}
.cp-info h3{font-size:1rem;font-weight:800}
.cp-info .sub{font-size:.8rem;color:#a07870;margin-top:.1rem}
.progress-wrap{margin:.8rem 0}
.prog-label{display:flex;justify-content:space-between;font-size:.8rem;color:#7a5c56;margin-bottom:.4rem;font-weight:600}
.prog-bar{background:#f0dbd5;border-radius:10px;height:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#b87c6e,#e8a598);border-radius:10px;transition:width .4s ease}
.reward-banner{background:linear-gradient(135deg,#fff8e1,#ffe082);border:1.5px solid #ffd54f;border-radius:12px;padding:.8rem 1rem;margin:.8rem 0;display:flex;align-items:center;gap:.7rem;font-size:.88rem;font-weight:700;color:#7a4f00;display:none}
.row-actions{display:flex;gap:.7rem;margin-top:.9rem;flex-wrap:wrap}
.btn{padding:.65rem 1.1rem;border-radius:10px;border:none;cursor:pointer;font-size:.87rem;font-weight:700;font-family:inherit;transition:all .15s}
.btn-p{background:#b87c6e;color:#fff}
.btn-p:hover{background:#a06058}
.btn-sm{background:#f5ebe7;color:#3d2b27;border:1.5px solid #e8c5b8;font-size:.8rem;padding:.5rem .8rem}
.btn-sm:hover{background:#ecddd8}
.btn-warn{background:#fdecea;color:#c0392b;border:none}
.btn-warn:hover{background:#f9c8c4}
.action-msg{font-size:.8rem;color:#5a9a6f;margin-top:.5rem;min-height:1em;font-weight:600}
/* Top clients */
.section-title{font-size:.85rem;font-weight:700;color:#7a5c56;text-transform:uppercase;letter-spacing:.06em;margin:.5rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:#e8c5b8}
.top-card{background:#fff;border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.65rem;box-shadow:0 1px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:.8rem;cursor:pointer;transition:box-shadow .12s}
.top-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09)}
.rank{width:28px;font-size:1.1rem;text-align:center;flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-nom{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sub{font-size:.76rem;color:#a07870;margin-top:.1rem}
.t-pts{font-weight:800;color:#b87c6e;font-size:.9rem;white-space:nowrap;flex-shrink:0}
.t-pts.reward{color:#e67e00}
.empty{text-align:center;padding:2rem;color:#c4a09a;font-size:.9rem}
/* Config Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(41,23,19,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:1.5rem 1.5rem 2rem}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.mh h2{font-size:1.05rem;font-weight:800}
.xbtn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#b0a09d}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.74rem;font-weight:700;color:#7a5c56;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;border:1.5px solid #e8c5b8;border-radius:10px;padding:.6rem .9rem;font-size:.95rem;color:#3d2b27;outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.field input:focus{border-color:#b87c6e}
.hint{font-size:.76rem;color:#bbb;margin-top:.3rem}
@media(min-width:580px){.overlay{align-items:center}.modal{border-radius:22px;margin:1rem}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back">&#8592;</a>
  <h1>⭐ Fidélité</h1>
  <button class="cfg-btn" onclick="openConfig()">⚙️ Réglages</button>
</header>

<main>
  <!-- Recherche rapide -->
  <div class="search-box">
    <h2>Trouver un client</h2>
    <input id="q" type="search" placeholder="Nom, téléphone…" oninput="search_()" autocomplete="off">
    <div class="results" id="results"></div>
  </div>

  <!-- Panneau client sélectionné -->
  <div class="client-panel" id="panel">
    <div class="cp-head">
      <div class="cp-av" id="pAv"></div>
      <div class="cp-info">
        <h3 id="pNom"></h3>
        <div class="sub" id="pSub"></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="prog-label">
        <span id="pPtsLabel"></span>
        <span id="pSeuil"></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="pBar" style="width:0%"></div></div>
    </div>
    <div class="reward-banner" id="pReward">🎁 <span id="pRewardTxt"></span></div>
    <div class="row-actions">
      <button class="btn btn-p" onclick="addVisit()">✂️ +1 visite</button>
      <button class="btn btn-sm" onclick="removePoint()">− 1 point</button>
      <button class="btn btn-warn btn-sm" onclick="resetPoints()">Remettre à zéro</button>
    </div>
    <div class="action-msg" id="actionMsg"></div>
  </div>

  <!-- Top clients -->
  <div class="section-title">🏆 Classement fidélité</div>
  <div id="topList"></div>
</main>

<!-- Modal config -->
<div class="overlay" id="ov" onclick="bkClose(event)">
  <div class="modal">
    <div class="mh"><h2>⚙️ Programme fidélité</h2><button class="xbtn" onclick="closeConfig()">&times;</button></div>
    <div class="field">
      <label>Points pour déclencher la récompense</label>
      <input id="cSeuil" type="number" min="1" step="1" placeholder="10">
      <div class="hint">Ex : 10 visites = 1 récompense</div>
    </div>
    <div class="field">
      <label>Description de la récompense</label>
      <input id="cRecomp" type="text" placeholder="Ex : Coupe offerte">
    </div>
    <div class="field">
      <label>Points ajoutés par visite</label>
      <input id="cPtsVisite" type="number" min="1" step="1" placeholder="1">
    </div>
    <div style="margin-top:1.2rem;display:flex;gap:.7rem">
      <button class="btn btn-p" style="flex:1" onclick="saveConfig()">Enregistrer</button>
      <button class="btn btn-sm" onclick="closeConfig()">Annuler</button>
    </div>
  </div>
</div>

<script>
var LS_C='clients-v1', LS_CF='fidelite-config-v1';
var selId=null;

function lc(){try{return JSON.parse(localStorage.getItem(LS_C)||'[]');}catch(e){return[];}}
function sc(a){localStorage.setItem(LS_C,JSON.stringify(a));}
function cfg(){var def={seuil:10,recompense:'Coupe offerte',ptsParVisite:1};try{return Object.assign({},def,JSON.parse(localStorage.getItem(LS_CF)||'{}'));}catch(e){return def;}}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function search_(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var res=document.getElementById('results');
  if(!q){res.innerHTML='';return;}
  var hits=lc().filter(function(c){return(c.nom||'').toLowerCase().includes(q)||(c.tel||'').includes(q);}).slice(0,6);
  if(!hits.length){res.innerHTML='<div style="font-size:.82rem;color:#bbb;padding:.4rem .2rem">Aucun résultat</div>';return;}
  res.innerHTML=hits.map(function(c){
    return '<div class="res-item" onclick="selectClient(\'' + c.id + '\')">'+'<div class="res-av">'+ini(c.nom)+'</div>'+esc(c.nom)+(c.tel?' · <span style="color:#aaa">'+esc(c.tel)+'</span>':'')+'</div>';
  }).join('');
}

function selectClient(id){
  var c=lc().find(function(x){return x.id===id;});
  if(!c)return;
  selId=id;
  document.getElementById('q').value='';
  document.getElementById('results').innerHTML='';
  renderPanel(c);
}

function renderPanel(c){
  var cf=cfg();
  var pts=c.points||0, seuil=cf.seuil, pct=Math.min(100,Math.round((pts/seuil)*100));
  document.getElementById('pAv').textContent=ini(c.nom);
  document.getElementById('pNom').textContent=c.nom;
  document.getElementById('pSub').textContent=c.tel||c.mail||'';
  document.getElementById('pPtsLabel').textContent=pts+' point'+(pts>1?'s':'');
  document.getElementById('pSeuil').textContent='Objectif : '+seuil;
  document.getElementById('pBar').style.width=pct+'%';
  var rw=document.getElementById('pReward'), rwTxt=document.getElementById('pRewardTxt');
  if(pts>=seuil){rw.style.display='flex';rwTxt.textContent='Récompense disponible : '+cf.recompense;}else{rw.style.display='none';}
  document.getElementById('actionMsg').textContent='';
  document.getElementById('panel').style.display='block';
}

function addVisit(){
  if(!selId)return;
  var cf=cfg(), all=lc();
  var i=all.findIndex(function(x){return x.id===selId;});
  if(i<0)return;
  all[i].points=(all[i].points||0)+cf.ptsParVisite;
  all[i].maj=new Date().toISOString();
  sc(all);
  var msg='✓ +'+cf.ptsParVisite+' point'+(cf.ptsParVisite>1?'s':'')+' ajouté'+(cf.ptsParVisite>1?'s':'')+'.';
  if(all[i].points>=cf.seuil)msg+=' 🎁 Récompense débloquée !';
  document.getElementById('actionMsg').textContent=msg;
  renderPanel(all[i]);
  renderTop();
}

function removePoint(){
  if(!selId)return;
  var all=lc();
  var i=all.findIndex(function(x){return x.id===selId;});
  if(i<0||all[i].points<=0)return;
  all[i].points=Math.max(0,(all[i].points||0)-1);
  all[i].maj=new Date().toISOString();
  sc(all);
  document.getElementById('actionMsg').textContent='− 1 point retiré.';
  renderPanel(all[i]);renderTop();
}

function resetPoints(){
  if(!selId||!confirm('Remettre les points à zéro ?'))return;
  var all=lc();
  var i=all.findIndex(function(x){return x.id===selId;});
  if(i<0)return;
  all[i].points=0;all[i].maj=new Date().toISOString();
  sc(all);
  document.getElementById('actionMsg').textContent='Points remis à zéro.';
  renderPanel(all[i]);renderTop();
}

function renderTop(){
  var cf=cfg(), seuil=cf.seuil;
  var all=lc().filter(function(c){return(c.points||0)>0;});
  all.sort(function(a,b){return(b.points||0)-(a.points||0);});
  var top=all.slice(0,10);
  if(!top.length){document.getElementById('topList').innerHTML='<div class="empty">Aucun point attribué encore.</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var h=top.map(function(c,i){
    var pts=c.points||0, hasR=pts>=seuil;
    return '<div class="top-card" onclick="selectClient(\'' + c.id + '\')">'+'<div class="rank">'+(medals[i]||'·')+'</div>'+'<div class="t-info"><div class="t-nom">'+esc(c.nom)+'</div><div class="t-sub">'+(hasR?'Récompense dispo !':pts+' / '+seuil+' visites')+'</div></div>'+'<div class="t-pts'+(hasR?' reward':'')+'">'+(hasR?'🎁':pts)+' pt'+(pts>1?'s':'')+'</div>'+'</div>';
  }).join('');
  document.getElementById('topList').innerHTML=h;
}

function openConfig(){
  var cf=cfg();
  document.getElementById('cSeuil').value=cf.seuil;
  document.getElementById('cRecomp').value=cf.recompense;
  document.getElementById('cPtsVisite').value=cf.ptsParVisite;
  document.getElementById('ov').classList.add('open');
}
function saveConfig(){
  var s=parseInt(document.getElementById('cSeuil').value,10)||10;
  var r=(document.getElementById('cRecomp').value||'').trim()||'Récompense';
  var p=parseInt(document.getElementById('cPtsVisite').value,10)||1;
  localStorage.setItem(LS_CF,JSON.stringify({seuil:s,recompense:r,ptsParVisite:p}));
  closeConfig();
  if(selId){var c=lc().find(function(x){return x.id===selId;});if(c)renderPanel(c);}
  renderTop();
}
function closeConfig(){document.getElementById('ov').classList.remove('open');}
function bkClose(e){if(e.target===document.getElementById('ov'))closeConfig();}

renderTop();
</script>
</body>
</html>
