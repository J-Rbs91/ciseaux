<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fidélité — KuT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF1EF;color:#1C2321;min-height:100vh;padding-bottom:4rem}
header{background:#1C2321;color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:20}
.back{color:#fff;text-decoration:none;font-size:1.3rem;opacity:.85}
.back:hover{opacity:1}
h1{font-size:1.08rem;font-weight:800;flex:1}
.cfg-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:.4rem .8rem;border-radius:16px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:inherit}
main{padding:1.1rem;max-width:620px;margin:0 auto}
/* Recherche rapide */
.search-box{background:#fff;border-radius:16px;padding:1.1rem 1.2rem;box-shadow:0 2px 12px rgba(28,35,33,.1);margin-bottom:1.1rem}
.search-box h2{font-size:.9rem;font-weight:700;color:#A22C29;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.05em}
.search-box input{width:100%;border:1.5px solid #c8d4da;border-radius:10px;padding:.62rem .9rem;font-size:.95rem;color:#EEF1EF;outline:none;background:#EEF1EF;font-family:inherit;transition:border-color .15s}
.search-box input:focus{border-color:#A22C29;background:#fff}
.results{margin-top:.6rem}
.res-item{padding:.55rem .7rem;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:.6rem;transition:background .12s}
.res-item:hover{background:#EEF1EF}
.res-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c8d4da,#46505d);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#EEF1EF;flex-shrink:0}
/* Client actif */
.client-panel{background:#fff;border-radius:18px;padding:1.3rem 1.4rem;box-shadow:0 2px 14px rgba(28,35,33,.1);margin-bottom:1.1rem;display:none}
.cp-head{display:flex;align-items:center;gap:.9rem;margin-bottom:1rem}
.cp-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#c8d4da,#46505d);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0}
.cp-info h3{font-size:1rem;font-weight:800}
.cp-info .sub{font-size:.8rem;color:#A9B4C2;margin-top:.1rem}
.progress-wrap{margin:.8rem 0}
.prog-label{display:flex;justify-content:space-between;font-size:.8rem;color:#A9B4C2;margin-bottom:.4rem;font-weight:600}
.prog-bar{background:#f5f8fa;border-radius:10px;height:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#A22C29,#8a2422);border-radius:10px;transition:width .4s ease}
.reward-banner{background:linear-gradient(135deg,#1a0e0a,#3a3320);border:1.5px solid #A22C29;border-radius:12px;padding:.8rem 1rem;margin:.8rem 0;display:flex;align-items:center;gap:.7rem;font-size:.88rem;font-weight:700;color:#8a2422;display:none}
.row-actions{display:flex;gap:.7rem;margin-top:.9rem;flex-wrap:wrap}
.btn{padding:.65rem 1.1rem;border-radius:10px;border:none;cursor:pointer;font-size:.87rem;font-weight:700;font-family:inherit;transition:all .15s}
.btn-p{background:#A22C29;color:#1C2321}
.btn-p:hover{background:#8a2422}
.btn-sm{background:#EEF1EF;color:#EEF1EF;border:1.5px solid #c8d4da;font-size:.8rem;padding:.5rem .8rem}
.btn-sm:hover{background:#e4eaed}
.btn-warn{background:#2a1f1f;color:#A22C29;border:none}
.btn-warn:hover{background:#3a2625}
.action-msg{font-size:.8rem;color:#5E6572;margin-top:.5rem;min-height:1em;font-weight:600}
/* Top clients */
.section-title{font-size:.85rem;font-weight:700;color:#A9B4C2;text-transform:uppercase;letter-spacing:.06em;margin:.5rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
.section-title::after{content:'';flex:1;height:1px;background:#c8d4da}
.top-card{background:#fff;border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.65rem;box-shadow:0 1px 8px rgba(28,35,33,.1);display:flex;align-items:center;gap:.8rem;cursor:pointer;transition:box-shadow .12s}
.top-card:hover{box-shadow:0 4px 14px rgba(28,35,33,.12)}
.rank{width:28px;font-size:1.1rem;text-align:center;flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-nom{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sub{font-size:.76rem;color:#A9B4C2;margin-top:.1rem}
.t-pts{font-weight:800;color:#A22C29;font-size:.9rem;white-space:nowrap;flex-shrink:0}
.t-pts.reward{color:#A9B4C2}
.empty{text-align:center;padding:2rem;color:#5E6572;font-size:.9rem}
/* Passage */
.presta-check{display:flex;align-items:center;gap:.7rem;padding:.62rem .3rem;font-size:.93rem;border-bottom:1px solid #dde4e8;cursor:pointer}
.presta-check:last-child{border-bottom:none}
.presta-check input{width:18px;height:18px;accent-color:#A22C29;flex-shrink:0}
.presta-check .pc-nom{flex:1;min-width:0}
.presta-check .pc-prix{color:#A22C29;font-weight:700;white-space:nowrap}
/* Config Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,35,33,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:1.5rem 1.5rem 2rem}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.mh h2{font-size:1.05rem;font-weight:800}
.xbtn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#A9B4C2}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.74rem;font-weight:700;color:#A9B4C2;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;border:1.5px solid #c8d4da;border-radius:10px;padding:.6rem .9rem;font-size:.95rem;color:#EEF1EF;outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.field input:focus{border-color:#A22C29}
.hint{font-size:.76rem;color:#A9B4C2;margin-top:.3rem}
@media(min-width:580px){.overlay{align-items:center}.modal{border-radius:22px;margin:1rem}}



/* ── MODE SOBRE — Carbon + accent rouge ── */

.remise-alert{background:#fef2f2!important;border:1px solid #dde4e8!important;border-left:4px solid #A22C29!important;color:#A22C29!important}

/* ── BOUTON BASCULE CLAIR/SOMBRE ── */

.theme-toggle:hover{background:rgba(255,255,255,.28)}

<main>

    <div class="mh"><h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="17" height="17" fill="currentColor" style="vertical-align:-.18em" aria-hidden="true"><path d="M19.9 12.66a1 1 0 0 1 0-1.32l1.28-1.44a1 1 0 0 0 .12-1.17l-2-3.46a1 1 0 0 0-1.07-.48l-1.88.38a1 1 0 0 1-1.15-.66l-.61-1.83a1 1 0 0 0-.95-.68h-4a1 1 0 0 0-1 .68l-.56 1.83a1 1 0 0 1-1.15.66L5 4.79a1 1 0 0 0-1 .48L2 8.73a1 1 0 0 0 .1 1.17l1.27 1.44a1 1 0 0 1 0 1.32L2.1 14.1a1 1 0 0 0-.1 1.17l2 3.46a1 1 0 0 0 1.07.48l1.88-.38a1 1 0 0 1 1.15.66l.61 1.83a1 1 0 0 0 1 .68h4a1 1 0 0 0 .95-.68l.61-1.83a1 1 0 0 1 1.15-.66l1.88.38a1 1 0 0 0 1.07-.48l2-3.46a1 1 0 0 0-.12-1.17ZM18.41 14l.8.9-1.28 2.22-1.18-.24a3 3 0 0 0-3.45 2L12.92 20h-2.56L10 18.86a3 3 0 0 0-3.45-2l-1.18.24-1.3-2.21.8-.9a3 3 0 0 0 0-4l-.8-.9 1.28-2.2 1.18.24a3 3 0 0 0 3.45-2L10.36 4h2.56l.38 1.14a3 3 0 0 0 3.45 2l1.18-.24 1.28 2.22-.8.9a3 3 0 0 0 0 3.98Zm-6.77-6a4 4 0 1 0 4 4 4 4 0 0 0-4-4Zm0 6a2 2 0 1 1 2-2 2 2 0 0 1-2 2Z"></path></svg> Programme fidélité</h2><button class="xbtn" onclick="closeConfig()">&times;</button></div>
    <div class="field">
      <label>Points pour déclencher la récompense</label>

<script>
var LS_C='clients-v1', LS_CF='fidelite-config-v1';
var selId=null;

function lc(){try{return JSON.parse(localStorage.getItem(LS_C)||'[]');}catch(e){return[];}}
function sc(a){localStorage.setItem(LS_C,JSON.stringify(a));}
function cfg(){var def={seuil:10,recompense:'Coupe offerte',ptsParVisite:1};try{return Object.assign({},def,JSON.parse(localStorage.getItem(LS_CF)||'{}'));}catch(e){return def;}}
function ini(n){return(n||'').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function presta(){try{var p=JSON.parse(localStorage.getItem('profil-magasin-v1')||'{}');return Array.isArray(p.prestations)?p.prestations:[];}catch(e){return[];}}
function eur(n){n=Math.round((+n||0)*100)/100;return n.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:2})+' €';}
function statsOf(v){
  v=(v||[]).filter(function(x){return x&&x.date;}).slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var n=v.length,sum=0,amt=0,gaps=[],i;
  for(i=0;i<n;i++){var m=+v[i].montant||0;if(m>0){sum+=m;amt++;}}
  for(i=1;i<n;i++){gaps.push((new Date(v[i].date)-new Date(v[i-1].date))/86400000);}
  return {n:n,panier:amt?sum/amt:0,total:sum,delai:gaps.length?Math.round(gaps.reduce(function(a,b){return a+b;},0)/gaps.length):0,last:n?v[n-1].date:null};
}

function search_(){
  var q=(document.getElementById('q').value||'').toLowerCase().trim();
  var res=document.getElementById('results');
  if(!q){res.innerHTML='';return;}
  var hits=lc().filter(function(c){return(c.nom||'').toLowerCase().includes(q)||(c.tel||'').includes(q);}).slice(0,6);
  if(!hits.length){res.innerHTML='<div style="font-size:.82rem;color:#A9B4C2;padding:.4rem .2rem">Aucun résultat</div>';return;}
  res.innerHTML=hits.map(function(c){
    return '<div class="res-item" onclick="selectClient(\'' + c.id + '\')">'+'<div class="res-av">'+ini(c.nom)+'</div>'+esc(c.nom)+(c.tel?' · <span style="color:#5E6572">'+esc(c.tel)+'</span>':'')+'</div>';
  }).join('');
}

function selectClient(id){
  var c=lc().find(function(x){return x.id===id;});
  if(!c)return;
  selId=id;
  document.getElementById('q').value='';
  document.getElementById('results').innerHTML='';
  renderPanel(c);
}

function renderPanel(c){
  var cf=cfg();
  var pts=c.points||0, seuil=cf.seuil, pct=Math.min(100,Math.round((pts/seuil)*100));
  document.getElementById('pAv').textContent=ini(c.nom);
  document.getElementById('pNom').textContent=c.nom;
  document.getElementById('pSub').textContent=c.tel||c.mail||'';
  var v=Array.isArray(c.visites)?c.visites:[],st=statsOf(v),sEl=document.getElementById('pStats');
  if(v.length){var bits=[v.length+' passage'+(v.length>1?'s':'')];if(st.panier)bits.push('panier moy. '+eur(st.panier));if(st.delai)bits.push('~'+st.delai+' j entre 2');sEl.textContent=bits.join(' · ');sEl.style.display='';}else{sEl.style.display='none';sEl.textContent='';}
  document.getElementById('pPtsLabel').textContent=pts+' point'+(pts>1?'s':'');
  document.getElementById('pSeuil').textContent='Objectif : '+seuil;
  document.getElementById('pBar').style.width=pct+'%';
  var rw=document.getElementById('pReward'), rwTxt=document.getElementById('pRewardTxt');
  if(pts>=seuil){rw.style.display='flex';rwTxt.textContent='Récompense disponible : '+cf.recompense;}else{rw.style.display='none';}
  document.getElementById('actionMsg').textContent='';
  document.getElementById('panel').style.display='block';
}

function openPassage(){
  if(!selId)return;
  var c=lc().find(function(x){return x.id===selId;});if(!c)return;
  document.getElementById('passWho').textContent='Client : '+c.nom;
  var list=presta(), box=document.getElementById('passList');
  if(!list.length){
    box.innerHTML='<div class="hint">Aucune prestation configurée. Ajoutez vos prestations sur la page <strong>Prestations</strong> (écran d\'accueil) pour les cocher ici et calculer le panier moyen. Vous pouvez tout de même saisir un montant ci-dessous.</div>';
    document.getElementById('passHint').textContent='';
  }else{
    box.innerHTML=list.map(function(p){
      return '<label class="presta-check"><input type="checkbox" data-prix="'+(+p.prix||0)+'" data-nom="'+escAttr(p.nom)+'" onchange="recalcMontant()"><span class="pc-nom">'+esc(p.nom)+'</span><span class="pc-prix">'+eur(p.prix)+'</span></label>';
    }).join('');
    document.getElementById('passHint').textContent='Total calculé depuis les prestations cochées (modifiable).';
  }
  document.getElementById('passMontant').value='';
  document.getElementById('ovPass').classList.add('open');
}
function recalcMontant(){
  var sum=0, boxes=document.querySelectorAll('#passList input[type=checkbox]'), i;
  for(i=0;i<boxes.length;i++){if(boxes[i].checked)sum+=parseFloat(boxes[i].getAttribute('data-prix'))||0;}
  document.getElementById('passMontant').value=sum?(Math.round(sum*100)/100):'';
}
function validatePassage(){
  if(!selId)return;
  var all=lc(), i=all.findIndex(function(x){return x.id===selId;});if(i<0)return;
  var items=[], boxes=document.querySelectorAll('#passList input[type=checkbox]'), k;
  for(k=0;k<boxes.length;k++){if(boxes[k].checked)items.push({nom:boxes[k].getAttribute('data-nom')||'',prix:parseFloat(boxes[k].getAttribute('data-prix'))||0});}
  var montant=parseFloat(document.getElementById('passMontant').value);
  if(isNaN(montant))montant=items.reduce(function(a,b){return a+(+b.prix||0);},0);
  var cf=cfg();
  if(!Array.isArray(all[i].visites))all[i].visites=[];
  all[i].visites.push({date:new Date().toISOString(),items:items,montant:Math.round((+montant||0)*100)/100});
  all[i].points=(all[i].points||0)+cf.ptsParVisite;
  all[i].maj=new Date().toISOString();
  sc(all);
  closePass();
  var msg='✓ Passage enregistré (+'+cf.ptsParVisite+' pt'+(cf.ptsParVisite>1?'s':'')+').';
  if(all[i].points>=cf.seuil)msg+=' Récompense débloquée !';
  document.getElementById('actionMsg').textContent=msg;
  renderPanel(all[i]);renderTop();
}
function undoPassage(){
  if(!selId)return;
  var all=lc(), i=all.findIndex(function(x){return x.id===selId;});if(i<0)return;
  if(!Array.isArray(all[i].visites)||!all[i].visites.length){document.getElementById('actionMsg').textContent='Aucun passage à annuler.';return;}
  if(!confirm('Annuler le dernier passage enregistré ? Les points correspondants seront retirés.'))return;
  var cf=cfg();
  all[i].visites.pop();
  all[i].points=Math.max(0,(all[i].points||0)-cf.ptsParVisite);
  all[i].maj=new Date().toISOString();
  sc(all);
  document.getElementById('actionMsg').textContent='↩︎ Dernier passage annulé.';
  renderPanel(all[i]);renderTop();
}
function closePass(){document.getElementById('ovPass').classList.remove('open');}
function bkClosePass(e){if(e.target===document.getElementById('ovPass'))closePass();}

function removePoint(){
  if(!selId)return;
  var all=lc();
  var i=all.findIndex(function(x){return x.id===selId;});
  if(i<0||all[i].points<=0)return;
  all[i].points=Math.max(0,(all[i].points||0)-1);
  all[i].maj=new Date().toISOString();
  sc(all);
  document.getElementById('actionMsg').textContent='− 1 point retiré.';
  renderPanel(all[i]);renderTop();
}

function resetPoints(){
  if(!selId||!confirm('Remettre les points à zéro ?'))return;
  var all=lc();
  var i=all.findIndex(function(x){return x.id===selId;});
  if(i<0)return;
  all[i].points=0;all[i].maj=new Date().toISOString();
  sc(all);
  document.getElementById('actionMsg').textContent='Points remis à zéro.';
  renderPanel(all[i]);renderTop();
}

function renderTop(){
  var cf=cfg(), seuil=cf.seuil;
  var all=lc().filter(function(c){return(c.points||0)>0;});
  all.sort(function(a,b){return(b.points||0)-(a.points||0);});
  var top=all.slice(0,10);
  if(!top.length){document.getElementById('topList').innerHTML='<div class="empty">Aucun point attribué encore.</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var h=top.map(function(c,i){
    var pts=c.points||0, hasR=pts>=seuil;
    return '<div class="top-card" onclick="selectClient(\'' + c.id + '\')">'+'<div class="rank">'+(medals[i]||'·')+'</div>'+'<div class="t-info"><div class="t-nom">'+esc(c.nom)+'</div><div class="t-sub">'+(hasR?'Récompense dispo !':pts+' / '+seuil+' visites')+'</div></div>'+'<div class="t-pts'+(hasR?' reward':'')+'">'+(hasR?'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" style="vertical-align:-.18em" aria-hidden="true"><path d="M18,7h-.35A3.45,3.45,0,0,0,18,5.5a3.49,3.49,0,0,0-6-2.44A3.49,3.49,0,0,0,6,5.5,3.45,3.45,0,0,0,6.35,7H6a3,3,0,0,0-3,3v2a1,1,0,0,0,1,1H5v6a3,3,0,0,0,3,3h8a3,3,0,0,0,3-3V13h1a1,1,0,0,0,1-1V10A3,3,0,0,0,18,7ZM11,20H8a1,1,0,0,1-1-1V13h4Zm0-9H5V10A1,1,0,0,1,6,9h5Zm0-4H9.5A1.5,1.5,0,1,1,11,5.5Zm2-1.5A1.5,1.5,0,1,1,14.5,7H13ZM17,19a1,1,0,0,1-1,1H13V13h4Zm2-8H13V9h5a1,1,0,0,1,1,1Z"></path></svg>':pts)+' pt'+(pts>1?'s':'')+'</div>'+'</div>';
  }).join('');
  document.getElementById('topList').innerHTML=h;
}

function openConfig(){
  var cf=cfg();
  document.getElementById('cSeuil').value=cf.seuil;
  document.getElementById('cRecomp').value=cf.recompense;
  document.getElementById('cPtsVisite').value=cf.ptsParVisite;
  document.getElementById('ov').classList.add('open');
}
function saveConfig(){
  var s=parseInt(document.getElementById('cSeuil').value,10)||10;
  var r=(document.getElementById('cRecomp').value||'').trim()||'Récompense';
  var p=parseInt(document.getElementById('cPtsVisite').value,10)||1;
  localStorage.setItem(LS_CF,JSON.stringify({seuil:s,recompense:r,ptsParVisite:p}));
  closeConfig();
  if(selId){var c=lc().find(function(x){return x.id===selId;});if(c)renderPanel(c);}
  renderTop();
}
function closeConfig(){document.getElementById('ov').classList.remove('open');}
function bkClose(e){if(e.target===document.getElementById('ov'))closeConfig();}

renderTop();
</script>
<script>

  var MOON='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M21.64 13a1 1 0 0 0-1.05-.14 8.05 8.05 0 0 1-3.37.73A8.15 8.15 0 0 1 9.08 5.49a8.59 8.59 0 0 1 .25-2A1 1 0 0 0 8 2.36 10.14 10.14 0 1 0 22 14.05a1 1 0 0 0-.36-1.05Zm-9.5 6.69A8.14 8.14 0 0 1 7.08 5.22v.27A10.15 10.15 0 0 0 17.19 15.6a9.79 9.79 0 0 0 2.1-.22 8.11 8.11 0 0 1-7.15 4.31Z"/></svg>';
  var b=document.createElement("button");b.id="themeToggle";b.type="button";b.className="theme-toggle";
  function refresh(){var d=cur()==="dark";b.innerHTML=d?SUN:MOON;var l=d?"Passer en mode clair":"Passer en mode sombre";b.setAttribute("aria-label",l);b.title=l;}
  b.addEventListener("click",function(){var t=cur()==="dark"?"light":"dark";try{localStorage.setItem(K,t);}catch(e){}apply(t);refresh();});
  apply(cur());refresh();var H=document.querySelector("header");(H||document.body).appendChild(b);
})();
</script>
