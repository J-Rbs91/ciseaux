<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF1EF;color:#1C2321;min-height:100vh;display:flex;flex-direction:column}
header{background:#1C2321;color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem}
.back{color:#fff;text-decoration:none;font-size:1.3rem;opacity:.85;line-height:1;padding:.2rem}
.back:hover{opacity:1}
h1{font-size:1.08rem;font-weight:800;flex:1;display:flex;align-items:center;gap:.5rem}
main{padding:1.2rem;max-width:600px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;justify-content:center}
.intro{font-size:.85rem;color:#5E6572;line-height:1.5;margin:0 auto 1.3rem;text-align:center;max-width:440px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.card{background:#fff;border-radius:18px;padding:1.7rem 1.1rem 1.45rem;text-decoration:none;color:#1C2321;box-shadow:0 2px 14px rgba(28,35,33,.1);display:flex;flex-direction:column;align-items:center;gap:.6rem;transition:transform .15s,box-shadow .15s;border:1.5px solid transparent}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(94,101,114,.2);border-color:#c8d4da}
.card .icon{width:62px;height:62px;border-radius:50%;background:rgba(162,44,41,.09);display:flex;align-items:center;justify-content:center}
.card .label{font-size:1.04rem;font-weight:700}
.card .desc{font-size:.75rem;color:#A9B4C2;text-align:center;line-height:1.35}
.theme-toggle{position:fixed;left:.9rem;bottom:.9rem;z-index:40;width:30px;height:30px;border-radius:50%;border:1.5px solid #c8d4da;background:#fff;color:#1C2321;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;box-shadow:0 2px 10px rgba(28,35,33,.18);transition:background .15s}
.theme-toggle:hover{background:#f0f3f2}

/* ── MODE SOMBRE ── */
html[data-theme="dark"] body{background:#14181A;color:#E7ECEE}
html[data-theme="dark"] header{background:#0E1214}
html[data-theme="dark"] .card{background:#1F2528;color:#E7ECEE;border:1px solid #313A3F;box-shadow:0 1px 6px rgba(0,0,0,.4)}
html[data-theme="dark"] .card:hover{border-color:#3d484e;box-shadow:0 6px 20px rgba(0,0,0,.55)}
html[data-theme="dark"] .card .desc{color:#9AA6AE}
html[data-theme="dark"] .intro{color:#9AA6AE}

/* ── ADAPTATION ÉCRAN LARGE (desktop) ── */
@media(min-width:640px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:1024px){
  main{max-width:680px}
}

/* ── ERGONOMIE TACTILE (tablette paysage / mobile) ── */
@media (pointer:coarse){
  button:not(.toggle){min-height:44px}
  a.back{display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
  .theme-toggle{width:35px;height:35px}
}
</style>
<script>(function(){try{if(localStorage.getItem("kut-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
</head>
