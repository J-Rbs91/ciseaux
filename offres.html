<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offres — Ciseaux</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf3ef;color:#3d2b27;min-height:100vh;padding-bottom:4rem}
header{background:linear-gradient(135deg,#b87c6e,#9c5f52);color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem}
.back{color:#fff;text-decoration:none;font-size:1.3rem;opacity:.85}
.back:hover{opacity:1}
h1{font-size:1.08rem;font-weight:800;flex:1}
.btn-hdr{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:.45rem .9rem;border-radius:20px;cursor:pointer;font-size:.83rem;font-weight:700;font-family:inherit}
.btn-hdr:hover{background:rgba(255,255,255,.28)}
main{padding:1.1rem;max-width:620px;margin:0 auto}
.empty{text-align:center;color:#bbb;padding:3rem 1rem;font-size:.95rem}
.offre-card{background:#fff;border-radius:16px;padding:1.1rem 1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:.9rem;display:flex;align-items:flex-start;gap:.9rem}
.offre-card.inactif{opacity:.5}
.offre-badge{background:#f5ebe7;color:#b87c6e;font-size:.78rem;font-weight:800;border-radius:8px;padding:.28rem .65rem;white-space:nowrap;margin-top:.1rem}
.offre-body{flex:1;min-width:0}
.offre-nom{font-weight:800;font-size:.97rem;margin-bottom:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.offre-desc{font-size:.8rem;color:#7a5c56;line-height:1.4;margin-bottom:.3rem}
.offre-date{font-size:.74rem;color:#bbb}
.offre-actions{display:flex;gap:.4rem;flex-shrink:0}
.btn-ic{background:none;border:1.5px solid #e8c5b8;border-radius:8px;padding:.32rem .6rem;cursor:pointer;font-size:.85rem;color:#7a5c56;font-family:inherit;transition:all .15s}
.btn-ic:hover{background:#f5ebe7;border-color:#b87c6e;color:#b87c6e}
.btn-ic.del:hover{background:#fdf0ef;border-color:#c0392b;color:#c0392b}
.toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;margin-top:.15rem}
.toggle.on{background:#5a9a6f}
.toggle.off{background:#d0c0bd}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:18px}
.toggle.off::after{left:2px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(41,23,19,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:1.5rem 1.5rem 2rem}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.modal-header h2{font-size:1.1rem;font-weight:800}
.btn-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#b0a09d}
.btn-close:hover{color:#3d2b27}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.74rem;font-weight:700;color:#7a5c56;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.05em}
.field input,.field textarea{width:100%;border:1.5px solid #e8c5b8;border-radius:10px;padding:.62rem .9rem;font-size:.95rem;color:#3d2b27;outline:none;background:#fff;font-family:inherit;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:#b87c6e;box-shadow:0 0 0 3px rgba(184,124,110,.1)}
.field textarea{resize:vertical;min-height:80px}
.row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1.2rem}
.btn{padding:.68rem 1.1rem;border-radius:10px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;font-family:inherit;transition:all .15s}
.btn-primary{background:#b87c6e;color:#fff}
.btn-primary:hover{background:#a06058}
.btn-outline{background:#f5ebe7;color:#3d2b27;border:1.5px solid #e8c5b8}
.btn-outline:hover{background:#ecddd8}
@media(min-width:580px){.overlay{align-items:center}.modal{border-radius:22px;margin:1rem}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back">&#8592;</a>
  <h1>🏷️ Offres commerciales</h1>
  <button class="btn-hdr" onclick="openModal()">+ Nouvelle offre</button>
</header>

<main>
  <div id="liste"></div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="backdropClose(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Nouvelle offre</h2>
      <button class="btn-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="field"><label>Nom de l'offre ✱</label><input id="fNom" type="text" placeholder="Ex : Coupe + couleur"></div>
    <div class="field"><label>Réduction / avantage</label><input id="fReduction" type="text" placeholder="Ex : -20% ou 1 soin offert"></div>
    <div class="field"><label>Description</label><textarea id="fDesc" placeholder="Détails de l'offre…"></textarea></div>
    <div class="field"><label>Valable jusqu'au</label><input id="fDate" type="date"></div>
    <div class="row">
      <button class="btn btn-primary" onclick="saveOffre()">Enregistrer</button>
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<script>
var LS='offres-v1';
var editId=null;
function load(){try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch(e){return[];}}
function save(arr){localStorage.setItem(LS,JSON.stringify(arr));}

function render(){
  var arr=load(), el=document.getElementById('liste');
  if(!arr.length){el.innerHTML='<div class="empty">Aucune offre. Créez votre première offre avec le bouton + ci-dessus.</div>';return;}
  el.innerHTML=arr.map(function(o){
    var cls='offre-card'+(o.actif?'':' inactif');
    var date=o.validite?'Valable jusqu\'au '+o.validite:'';
    var nom=escH(o.nom||'Sans nom'), reduc=escH(o.reduction||''), desc=escH(o.desc||'');
    return '<div class="'+cls+'" id="card-'+o.id+'">'+'<div class="offre-badge">'+reduc+'</div>'+'<div class="offre-body"><div class="offre-nom">'+nom+'</div>'+(desc?'<div class="offre-desc">'+desc+'</div>':'')+(date?'<div class="offre-date">'+escH(date)+'</div>':'')+'</div>'+'<div class="offre-actions">'+'<button class="toggle '+(o.actif?'on':'off')+'" title="Activer/désactiver" onclick="toggleActif(\''+o.id+'\')" aria-label="Activer/désactiver"></button>'+'<button class="btn-ic" onclick="editOffre(\''+o.id+'\')" title="Modifier">✏️</button>'+'<button class="btn-ic del" onclick="delOffre(\''+o.id+'\')" title="Supprimer">🗑️</button>'+'</div></div>';
  }).join('');
}

function escH(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML;}

function openModal(id){
  editId=id||null;
  if(id){var arr=load(), o=arr.find(function(x){return x.id===id;});if(!o)return;
    document.getElementById('modalTitle').textContent='Modifier l\'offre';
    document.getElementById('fNom').value=o.nom||'';
    document.getElementById('fReduction').value=o.reduction||'';
    document.getElementById('fDesc').value=o.desc||'';
    document.getElementById('fDate').value=o.validite||'';
  }else{
    document.getElementById('modalTitle').textContent='Nouvelle offre';
    document.getElementById('fNom').value='';
    document.getElementById('fReduction').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fDate').value='';
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fNom').focus();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function backdropClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function saveOffre(){
  var nom=(document.getElementById('fNom').value||'').trim();
  if(!nom){alert('Le nom de l\'offre est requis.');return;}
  var arr=load();
  if(editId){var idx=arr.findIndex(function(x){return x.id===editId;});if(idx>=0){arr[idx].nom=nom;arr[idx].reduction=(document.getElementById('fReduction').value||'').trim();arr[idx].desc=(document.getElementById('fDesc').value||'').trim();arr[idx].validite=document.getElementById('fDate').value||'';arr[idx].maj=new Date().toISOString();}}
  else{arr.push({id:'o_'+Date.now()+'_'+Math.floor(Math.random()*1e4),nom:nom,reduction:(document.getElementById('fReduction').value||'').trim(),desc:(document.getElementById('fDesc').value||'').trim(),validite:document.getElementById('fDate').value||'',actif:true,createdAt:new Date().toISOString()});}
  save(arr);closeModal();render();
}

function editOffre(id){openModal(id);}

function delOffre(id){
  if(!confirm('Supprimer cette offre ?'))return;
  var arr=load().filter(function(o){return o.id!==id;});
  save(arr);render();
}

function toggleActif(id){
  var arr=load(), o=arr.find(function(x){return x.id===id;});
  if(o)o.actif=!o.actif;
  save(arr);render();
}

render();
</script>
</body>
</html>
