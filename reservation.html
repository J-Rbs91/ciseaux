<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Prendre rendez-vous</title>
<style>
  :root{--rose:#b87c6e;--rose-d:#9c5f50;--bg:#fdf3ef;--card:#fff;--txt:#3d2b27;--muted:#9a8077;--line:#f0dbd5;--err:#A22C29}
  @media (prefers-color-scheme: dark){
    :root{--rose:#c98e80;--rose-d:#d9a596;--bg:#17120f;--card:#221b18;--txt:#ece3df;--muted:#a8978d;--line:#3a2e29;--err:#e0635d}
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
  .wrap{max-width:540px;margin:0 auto;padding:24px 18px 48px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.05)}
  h1{font-size:1.35rem;margin:0 0 .2rem}
  .sub{color:var(--muted);font-size:.9rem;margin:0 0 1.4rem}
  label{display:block;font-weight:600;font-size:.86rem;margin:.9rem 0 .3rem}
  .req:after{content:" *";color:var(--rose-d)}
  input,select,textarea{width:100%;padding:.6rem .7rem;border:1px solid var(--line);border-radius:10px;font:inherit;background:var(--card);color:var(--txt)}
  input:focus,select,textarea:focus{outline:2px solid var(--rose);outline-offset:-1px}
  textarea{resize:vertical;min-height:64px}
  .hint{font-size:.76rem;color:var(--muted);margin-top:.3rem}
  .two{display:flex;gap:.7rem}.two>div{flex:1}
  .consent{display:flex;gap:.55rem;align-items:flex-start;margin-top:1rem;font-size:.83rem}
  .consent input{width:auto;margin-top:.15rem;flex:none}
  .consent a{color:var(--rose-d)}
  .btn{width:100%;margin-top:1.5rem;padding:.85rem;border:none;border-radius:12px;background:var(--rose);color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.6;cursor:default}
  .msg{margin-top:1rem;padding:.8rem;border-radius:10px;font-size:.88rem;display:none}
  .msg.ok{display:block;background:#e8f5ec;color:#1f7a44;border:1px solid #bfe6cd}
  .msg.err{display:block;background:#fbeaea;color:var(--err);border:1px solid #f0caca}
  .hp{position:absolute;left:-9999px;top:-9999px;height:0;overflow:hidden}
  .foot{text-align:center;font-size:.75rem;color:var(--muted);margin-top:1.2rem}
  .ok-box{text-align:center;padding:10px 0}
  .ok-box .big{font-size:42px}
  /* Créneaux */
  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:.5rem;margin-top:.5rem}
  .slot{padding:.55rem .2rem;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--txt);font:inherit;font-weight:600;cursor:pointer;text-align:center}
  .slot:hover{border-color:var(--rose)}
  .slot.sel{background:var(--rose);border-color:var(--rose);color:#fff}
  .slots-state{font-size:.84rem;color:var(--muted);margin-top:.5rem}
  .price{color:var(--muted);font-weight:400}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="formCard">
    <h1 id="title">Prendre rendez-vous</h1>
    <p class="sub" id="subtitle">Choisissez votre prestation, puis un créneau disponible.</p>

    <form id="resaForm" autocomplete="on" novalidate>
      <!-- piège anti-robot : doit rester vide -->
      <div class="hp" aria-hidden="true"><label>Ne pas remplir<input type="text" id="hp" name="website" tabindex="-1" autocomplete="off"></label></div>

      <label class="req" for="prestation">Prestation</label>
      <select id="prestation" required></select>
      <div class="hint" id="prestaHint"></div>

      <label class="req" for="date">Date souhaitée</label>
      <input id="date" type="date" required>

      <label>Créneaux disponibles</label>
      <div id="slots" class="slots" style="display:none"></div>
      <div class="slots-state" id="slotsState">Choisissez d'abord une prestation et une date.</div>

      <div class="two">
        <div><label class="req" for="prenom">Prénom</label><input id="prenom" type="text" autocomplete="given-name" required></div>
        <div><label class="req" for="nom">Nom</label><input id="nom" type="text" autocomplete="family-name" required></div>
      </div>

      <label class="req" for="tel">Téléphone</label>
      <input id="tel" type="tel" inputmode="tel" autocomplete="tel" required>

      <label for="mail">Email</label>
      <input id="mail" type="email" autocomplete="email">
      <div class="hint">Pour recevoir la confirmation de votre rendez-vous.</div>

      <label for="dob">Date de naissance</label>
      <input id="dob" type="date">
      <div class="hint">Facultatif — uniquement pour vous offrir un cadeau le jour de votre anniversaire.</div>

      <label for="notes">Précisions (facultatif)</label>
      <textarea id="notes" placeholder="Demande particulière…"></textarea>

      <label class="consent">
        <input type="checkbox" id="cgu" required>
        <span>J'ai lu et j'accepte la <a href="confidentialite.html" target="_blank" rel="noopener">politique de confidentialité</a> et que mes coordonnées soient utilisées pour gérer mon rendez-vous. <strong>(obligatoire)</strong></span>
      </label>

      <label class="consent">
        <input type="checkbox" id="optin">
        <span>J'accepte de recevoir par email les offres et promotions du salon. (facultatif, désinscription à tout moment)</span>
      </label>

      <button class="btn" id="submitBtn" type="submit">Confirmer mon rendez-vous</button>
      <div class="msg" id="msg" role="alert"></div>
    </form>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ============================================================
   CONFIGURATION DU SALON — à éditer une seule fois après le fork.
   - api   : l'URL …/exec de VOTRE script Apps Script.
   - salon : nom affiché (sinon récupéré automatiquement du script).
   Les prestations et leurs durées sont chargées automatiquement
   depuis votre catalogue (page Prestations). Rien d'autre à saisir ici.
   On peut aussi passer ?api=...&salon=... en paramètres d'URL.
   ============================================================ */
var CONFIG = { api: "", salon: "Mon salon" };

var CATALOGUE = [], GRAN = 15, HORIZON = 30, selectedSlot = '', loadingSlots = false;

(function(){
  var qs = new URLSearchParams(location.search);
  if (qs.get('api'))   CONFIG.api   = qs.get('api');
  if (qs.get('salon')) CONFIG.salon = qs.get('salon');
  document.getElementById('foot').textContent = CONFIG.salon;
  document.title = 'Rendez-vous · ' + CONFIG.salon;
  var today = new Date().toISOString().slice(0,10);
  var dEl = document.getElementById('date');
  dEl.min = today;

  if (!CONFIG.api) { setSlotsState('Formulaire non configuré (URL du salon manquante).'); return; }
  jsonp(CONFIG.api, { action:'catalogue' }, function(r){
    if (r && r.ok) {
      if (r.salon) { CONFIG.salon = r.salon; document.getElementById('foot').textContent = r.salon; document.title = 'Rendez-vous · ' + r.salon; }
      HORIZON = r.horizonJours || 30; GRAN = r.granularite || 15;
      var max = new Date(); max.setDate(max.getDate() + HORIZON);
      dEl.max = max.toISOString().slice(0,10);
      CATALOGUE = (r.prestations || []);
      fillPrestations();
    } else {
      setSlotsState('Réservation en ligne momentanément indisponible.');
    }
  });

  document.getElementById('prestation').addEventListener('change', onCriteriaChange);
  dEl.addEventListener('change', onCriteriaChange);
})();

function fillPrestations(){
  var sel = document.getElementById('prestation');
  sel.innerHTML = '';
  var o0 = document.createElement('option'); o0.value=''; o0.textContent='— choisir une prestation —'; sel.appendChild(o0);
  if (!CATALOGUE.length) {
    var o = document.createElement('option'); o.value='__autre__'; o.textContent='Rendez-vous'; sel.appendChild(o);
    document.getElementById('prestaHint').textContent = '';
    return;
  }
  CATALOGUE.forEach(function(p, i){
    var o = document.createElement('option'); o.value = String(i);
    var dur = p.duree ? ' · ' + p.duree + ' min' : '';
    var prix = (p.prix !== '' && p.prix != null) ? ' · ' + p.prix + ' €' : '';
    o.textContent = p.nom + dur + prix;
    sel.appendChild(o);
  });
}

function currentPresta(){
  var v = document.getElementById('prestation').value;
  if (v === '' ) return null;
  if (v === '__autre__') return { nom:'Rendez-vous', duree:0 };
  return CATALOGUE[+v] || null;
}

function onCriteriaChange(){
  selectedSlot = '';
  var p = currentPresta(), date = document.getElementById('date').value;
  var hint = document.getElementById('prestaHint');
  hint.textContent = (p && p.duree) ? ('Durée estimée : ' + p.duree + ' min') : '';
  var box = document.getElementById('slots'); box.style.display='none'; box.innerHTML='';
  if (!p || !date) { setSlotsState('Choisissez d\'abord une prestation et une date.'); return; }
  loadSlots(p, date);
}

function loadSlots(p, date){
  loadingSlots = true; setSlotsState('Recherche des créneaux…');
  jsonp(CONFIG.api, { action:'availability', date:date, duree:(p.duree||'') }, function(r){
    loadingSlots = false;
    if (!r || !r.ok) { setSlotsState('Impossible de charger les créneaux. Réessayez.'); return; }
    var slots = r.slots || [];
    var box = document.getElementById('slots');
    if (!slots.length) { box.style.display='none'; setSlotsState('Aucun créneau disponible ce jour-là. Essayez une autre date.'); return; }
    setSlotsState(slots.length + ' créneau(x) disponible(s) :');
    box.style.display='grid';
    box.innerHTML = slots.map(function(t){ return '<button type="button" class="slot" onclick="pickSlot(this,\''+t+'\')">'+t+'</button>'; }).join('');
  });
}

function pickSlot(el, t){
  selectedSlot = t;
  [].forEach.call(document.querySelectorAll('.slot'), function(b){ b.classList.remove('sel'); });
  el.classList.add('sel');
}

function setSlotsState(txt){ document.getElementById('slotsState').textContent = txt; }

function jsonp(base, params, cb){
  var name='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  var s=document.createElement('script'), done=false;
  var t=setTimeout(function(){ if(!done) fin({ok:false,error:'délai dépassé'}); },20000);
  function fin(r){ done=true; clearTimeout(t); try{delete window[name];}catch(e){window[name]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); cb(r); }
  window[name]=function(r){ fin(r); };
  s.onerror=function(){ fin({ok:false,error:'réseau'}); };
  var q=[]; for(var k in params) if(params.hasOwnProperty(k)) q.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]));
  q.push('callback='+name);
  s.src=base+(base.indexOf('?')>=0?'&':'?')+q.join('&');
  document.body.appendChild(s);
}

function showMsg(cls, text){ var m=document.getElementById('msg'); m.className='msg '+cls; m.textContent=text; }

document.getElementById('resaForm').addEventListener('submit', function(e){
  e.preventDefault();
  var btn=document.getElementById('submitBtn');
  if(!CONFIG.api){ showMsg('err','Formulaire non configuré.'); return; }
  var p = currentPresta();
  if(!p){ showMsg('err','Choisissez une prestation.'); return; }
  if(!document.getElementById('date').value){ showMsg('err','Choisissez une date.'); return; }
  if(!selectedSlot){ showMsg('err','Choisissez un créneau disponible.'); return; }
  if(!document.getElementById('cgu').checked){ showMsg('err','Merci d\'accepter la politique de confidentialité.'); return; }

  var prenom=document.getElementById('prenom').value.trim();
  var nom=document.getElementById('nom').value.trim();
  var data={
    action:'createBooking',
    hp: document.getElementById('hp').value,
    nom: (prenom+' '+nom).trim(),
    tel: document.getElementById('tel').value.trim(),
    mail: document.getElementById('mail').value.trim(),
    dob: document.getElementById('dob').value,
    date: document.getElementById('date').value,
    heure: selectedSlot,
    duree: p.duree || '',
    prestation: p.nom || '',
    notes: document.getElementById('notes').value.trim(),
    optin: document.getElementById('optin').checked ? 'oui' : 'non'
  };
  if(!data.nom || !data.tel){ showMsg('err','Merci de renseigner votre nom et votre téléphone.'); return; }

  btn.disabled=true; btn.textContent='Confirmation…'; showMsg('','');
  jsonp(CONFIG.api, data, function(r){
    if(r && r.ok){
      document.getElementById('formCard').innerHTML =
        '<div class="ok-box"><div class="big">✅</div>'+
        '<h1>Rendez-vous confirmé&nbsp;!</h1>'+
        '<p class="sub">Merci '+escapeHtml(prenom)+'. Votre rendez-vous du '+escapeHtml(frDate(data.date))+
        ' à '+escapeHtml(data.heure)+' ('+escapeHtml(p.nom)+') est enregistré chez '+escapeHtml(CONFIG.salon)+'.</p></div>';
    } else {
      btn.disabled=false; btn.textContent='Confirmer mon rendez-vous';
      showMsg('err', (r&&r.error) ? r.error : 'L\'envoi a échoué. Réessayez ou appelez le salon.');
      // Le créneau a pu être pris entre-temps : on rafraîchit la liste.
      if (r && r.error && /créneau/i.test(r.error)) onCriteriaChange();
    }
  });
});

function frDate(s){ var m=String(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/); return m? m[3]+'/'+m[2]+'/'+m[1] : s; }
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
