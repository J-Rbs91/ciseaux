<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Statistiques — KuT</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#1C2321">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Manrope",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF1EF;color:#1C2321;min-height:100vh;padding-bottom:3rem}
header{background:#1C2321;color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:20}
.back{color:#fff;text-decoration:none;font-size:1.3rem;opacity:.85;line-height:1;padding:.2rem}
.back:hover{opacity:1}
h1{font-size:1.08rem;font-weight:800;flex:1}
.count{font-size:.74rem;opacity:.75;white-space:nowrap}
main{max-width:620px;margin:0 auto;padding:1rem 1.1rem 0}

/* Sélecteur de période */
.period-bar{display:flex;gap:.4rem;margin-bottom:1.1rem;flex-wrap:wrap}
.pbtn{flex:1;min-width:72px;background:#fff;border:1.5px solid #c8d4da;color:#5E6572;border-radius:11px;padding:.5rem .4rem;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.pbtn:hover{border-color:#A9B4C2}
.pbtn.on{background:#A22C29;border-color:#A22C29;color:#fff}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.1rem}
.kpi{background:#fff;border-radius:16px;padding:1rem 1.1rem;box-shadow:0 2px 10px rgba(28,35,33,.1);border:1.5px solid transparent}
.kpi .k{font-size:.72rem;font-weight:700;color:#A9B4C2;text-transform:uppercase;letter-spacing:.05em}
.kpi .v{font-size:1.5rem;font-weight:800;margin-top:.25rem;line-height:1.1}
.kpi .d{font-size:.74rem;font-weight:700;margin-top:.3rem}
.kpi .d.pos{color:#3E7C4F}
.kpi .d.neg{color:#A22C29}
.kpi .d.flat{color:#A9B4C2}

/* Panneaux */
.panel{background:#fff;border-radius:16px;padding:1.1rem 1.1rem 1.2rem;box-shadow:0 2px 10px rgba(28,35,33,.1);margin-bottom:1.1rem}
.panel-title{font-size:.78rem;font-weight:800;color:#5E6572;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.panel-title .pt-sub{font-size:.7rem;font-weight:700;color:#A9B4C2;text-transform:none;letter-spacing:0}

/* Graphe (barres CSS, sans dépendance) */
.chart{display:flex;align-items:flex-end;gap:3px;height:148px;padding-top:1.2rem}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:.3rem;min-width:0}
.bar{width:100%;max-width:22px;min-height:2px;background:linear-gradient(180deg,#c0413e,#A22C29);border-radius:5px 5px 0 0;transition:height .3s}
.bar-col.cur .bar{background:linear-gradient(180deg,#1C2321,#3a4540)}
.bar-lbl{font-size:.62rem;font-weight:700;color:#A9B4C2;text-transform:uppercase}
.bar-col.cur .bar-lbl{color:#A22C29}

/* Classements */
.rank-item{padding:.55rem 0;border-bottom:1px solid #f0f3f2}
.rank-item:last-child{border-bottom:none}
.rank-head{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.35rem}
.rank-rk{font-size:.8rem;font-weight:800;color:#A9B4C2;width:1.3rem;flex-shrink:0}
.rank-name{flex:1;font-size:.92rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:.88rem;font-weight:800;white-space:nowrap}
.rank-sub{font-size:.74rem;font-weight:600;color:#A9B4C2;white-space:nowrap;margin-left:.4rem}
.rank-track{height:7px;background:#EEF1EF;border-radius:4px;overflow:hidden}
.rank-fill{height:100%;background:linear-gradient(90deg,#A22C29,#c97e7c);border-radius:4px;min-width:3px}

/* État vide */
.empty{text-align:center;padding:3rem 1.3rem 2.5rem;max-width:430px;margin:1.5rem auto;line-height:1.55}
.empty-ico{width:66px;height:66px;border-radius:50%;background:#fff;border:1.5px solid #dde4e8;display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;color:#A22C29}
.empty-title{font-size:1.08rem;font-weight:800;color:#1C2321;margin-bottom:.5rem}
.empty-text{font-size:.9rem;color:#5E6572;line-height:1.55;margin-bottom:1.3rem}
.empty-cta{display:inline-flex;align-items:center;gap:.45rem;background:#A22C29;color:#fff;text-decoration:none;padding:.65rem 1.2rem;border-radius:11px;font-size:.9rem;font-weight:700}
.muted{font-size:.86rem;color:#A9B4C2;text-align:center;padding:1rem .5rem}

/* Bascule clair/sombre */
.theme-toggle{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.18);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:background .15s}
.theme-toggle:hover{background:rgba(255,255,255,.28)}

/* ── Mode sombre ── */
html[data-theme="dark"] body{background:#14181A;color:#E7ECEE}
html[data-theme="dark"] header{background:#0E1214}
html[data-theme="dark"] .pbtn{background:#1F2528;color:#9AA6AE;border-color:#313A3F}
html[data-theme="dark"] .pbtn:hover{border-color:#3d484e}
html[data-theme="dark"] .pbtn.on{background:#A22C29;border-color:#A22C29;color:#fff}
html[data-theme="dark"] .kpi,
html[data-theme="dark"] .panel{background:#1F2528;color:#E7ECEE;border:1px solid #313A3F;box-shadow:0 1px 6px rgba(0,0,0,.4)}
html[data-theme="dark"] .kpi .k,
html[data-theme="dark"] .panel-title{color:#9AA6AE}
html[data-theme="dark"] .panel-title .pt-sub,
html[data-theme="dark"] .bar-lbl,
html[data-theme="dark"] .rank-rk,
html[data-theme="dark"] .rank-sub,
html[data-theme="dark"] .muted{color:#7F8C94}
html[data-theme="dark"] .kpi .d.pos{color:#6FBF85}
html[data-theme="dark"] .kpi .d.neg{color:#E0635D}
html[data-theme="dark"] .bar-col.cur .bar{background:linear-gradient(180deg,#E7ECEE,#9AA6AE)}
html[data-theme="dark"] .bar-col.cur .bar-lbl{color:#E0635D}
html[data-theme="dark"] .rank-item{border-bottom-color:#262d31}
html[data-theme="dark"] .rank-track{background:#171C1F}
html[data-theme="dark"] .empty-ico{background:#1F2528;border-color:#313A3F}
html[data-theme="dark"] .empty-title{color:#E7ECEE}
html[data-theme="dark"] .empty-text{color:#9AA6AE}
</style>
<script>(function(){try{if(localStorage.getItem("kut-theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
</head>
<body>

<header>
  <a href="index.html" class="back"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:block" aria-hidden="true"><path d="M13.41,12l3.3-3.29a1,1,0,1,0-1.42-1.42l-4,4a1,1,0,0,0,0,1.42l4,4a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42ZM8,7A1,1,0,0,0,7,8v8a1,1,0,0,0,2,0V8A1,1,0,0,0,8,7Z"></path></svg></a>
  <h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="#A22C29" style="vertical-align:-.18em" aria-hidden="true"><path d="M3,3a1,1,0,0,0-1,1V20a1,1,0,0,0,1,1H21a1,1,0,0,0,0-2H4V4A1,1,0,0,0,3,3Zm5,12a1,1,0,0,0,1-1V10a1,1,0,0,0-2,0v4A1,1,0,0,0,8,15Zm4,0a1,1,0,0,0,1-1V7a1,1,0,0,0-2,0v7A1,1,0,0,0,12,15Zm4,0a1,1,0,0,0,1-1V12a1,1,0,0,0-2,0v2A1,1,0,0,0,16,15Z"></path></svg> Statistiques</h1>
  <span class="count" id="syncSt"></span>
</header>

<main id="main">
  <div class="period-bar" id="periodBar">
    <button class="pbtn on" data-p="month">Ce mois</button>
    <button class="pbtn" data-p="prev">Mois dernier</button>
    <button class="pbtn" data-p="y12">12 mois</button>
    <button class="pbtn" data-p="all">Tout</button>
  </div>
  <div id="content"></div>
</main>

<script src="app-sync.js"></script>
<script>
var LS_C='clients-v1', LS_P='profil-magasin-v1';
var MOIS=['J','F','M','A','M','J','J','A','S','O','N','D'];
var MOIS_LONG=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
var period='month';

function lc(){try{return JSON.parse(localStorage.getItem(LS_C)||'[]');}catch(e){return[];}}
function eur(n){return (Math.round(n*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function eur0(n){return Math.round(n).toLocaleString('fr-FR')+' €';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* Aplatit tous les passages (visites) avec un lien vers le client. */
function allPassages(){
  var out=[];
  lc().forEach(function(c){
    var vs=Array.isArray(c.visites)?c.visites:[];
    vs.forEach(function(v){
      var d=new Date(v.date); if(isNaN(d.getTime())) return;
      out.push({d:d, montant:+v.montant||0, items:Array.isArray(v.items)?v.items:[], cid:c.id, cnom:c.nom||'Client'});
    });
  });
  return out;
}

function inPeriod(d){
  var now=new Date();
  if(period==='all') return true;
  if(period==='month') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  if(period==='prev'){ var m=now.getMonth()-1, y=now.getFullYear(); if(m<0){m=11;y--;} return d.getFullYear()===y && d.getMonth()===m; }
  if(period==='y12'){ var lim=new Date(now.getFullYear(),now.getMonth()-11,1); return d>=lim; }
  return true;
}

function kpis(ps){
  var ca=0, set={};
  ps.forEach(function(p){ ca+=p.montant; set[p.cid]=1; });
  return { ca:ca, n:ps.length, panier:ps.length?ca/ps.length:0, clients:Object.keys(set).length };
}

/* CA du mois calendaire en cours et du mois précédent (pour le delta). */
function caMois(offset){
  var now=new Date(); var m=now.getMonth()-offset, y=now.getFullYear();
  while(m<0){m+=12;y--;}
  var ca=0;
  allPassages().forEach(function(p){ if(p.d.getFullYear()===y && p.d.getMonth()===m) ca+=p.montant; });
  return ca;
}

function topPrestations(ps){
  var map={};
  ps.forEach(function(p){ p.items.forEach(function(it){
    var k=String(it.nom||'—').trim()||'—';
    var m=map[k]||(map[k]={nom:k,count:0,ca:0}); m.count++; m.ca+=(+it.prix||0);
  }); });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.ca-a.ca;});
}

function topClients(ps){
  var map={};
  ps.forEach(function(p){ var m=map[p.cid]||(map[p.cid]={nom:p.cnom,count:0,ca:0}); m.count++; m.ca+=p.montant; });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.ca-a.ca;});
}

/* Série des 12 derniers mois (toujours glissants, indépendant du filtre). */
function monthly(){
  var now=new Date(), keys=[], labels=[], vals=[];
  for(var i=11;i>=0;i--){ var d=new Date(now.getFullYear(),now.getMonth()-i,1); keys.push(d.getFullYear()+'-'+d.getMonth()); labels.push(MOIS[d.getMonth()]); vals.push(0); }
  var curKey=now.getFullYear()+'-'+now.getMonth();
  allPassages().forEach(function(p){ var k=p.d.getFullYear()+'-'+p.d.getMonth(); var idx=keys.indexOf(k); if(idx>=0) vals[idx]+=p.montant; });
  return { labels:labels, vals:vals, keys:keys, curKey:curKey };
}

/* Clients sans passage depuis plus de N jours (parmi ceux déjà venus). */
function dormants(days){
  var lim=Date.now()-days*86400000, n=0;
  lc().forEach(function(c){
    var vs=Array.isArray(c.visites)?c.visites:[]; if(!vs.length) return;
    var last=0; vs.forEach(function(v){ var t=new Date(v.date).getTime(); if(t>last) last=t; });
    if(last && last<lim) n++;
  });
  return n;
}

function bars(m){
  var max=Math.max.apply(null, m.vals.concat([1]));
  var H=104;
  return '<div class="chart">'+m.labels.map(function(lb,i){
    var h=Math.max(2, Math.round(m.vals[i]/max*H));
    var cur=m.keys[i]===m.curKey?' cur':'';
    var tip=MOIS_LONG[(new Date().getMonth()-11+i+24)%12]+' : '+eur0(m.vals[i]);
    return '<div class="bar-col'+cur+'" title="'+esc(tip)+'"><div class="bar" style="height:'+h+'px"></div><div class="bar-lbl">'+lb+'</div></div>';
  }).join('')+'</div>';
}

function rankList(rows, valFn, subFn){
  if(!rows.length) return '<div class="muted">Aucune donnée sur la période.</div>';
  var max=rows[0]._v||1;
  return rows.slice(0,5).map(function(r,i){
    var v=r._v, pct=Math.max(3, Math.round(v/max*100));
    return '<div class="rank-item">'+
      '<div class="rank-head"><span class="rank-rk">'+(i+1)+'</span>'+
      '<span class="rank-name">'+esc(r.nom)+'</span>'+
      '<span class="rank-val">'+valFn(r)+'</span><span class="rank-sub">'+subFn(r)+'</span></div>'+
      '<div class="rank-track"><div class="rank-fill" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}

function render(){
  var all=allPassages();
  var content=document.getElementById('content');

  if(!all.length){
    content.innerHTML='<div class="empty">'+
      '<div class="empty-ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="30" height="30" fill="currentColor" aria-hidden="true"><path d="M3,3a1,1,0,0,0-1,1V20a1,1,0,0,0,1,1H21a1,1,0,0,0,0-2H4V4A1,1,0,0,0,3,3Zm5,12a1,1,0,0,0,1-1V10a1,1,0,0,0-2,0v4A1,1,0,0,0,8,15Zm4,0a1,1,0,0,0,1-1V7a1,1,0,0,0-2,0v7A1,1,0,0,0,12,15Zm4,0a1,1,0,0,0,1-1V12a1,1,0,0,0-2,0v2A1,1,0,0,0,16,15Z"></path></svg></div>'+
      '<div class="empty-title">Pas encore de statistiques</div>'+
      '<div class="empty-text">Les chiffres apparaîtront dès que vous aurez enregistré des passages clients depuis la page Fidélité.</div>'+
      '<a class="empty-cta" href="fidelite.html">Enregistrer un passage</a></div>';
    document.getElementById('periodBar').style.display='none';
    return;
  }
  document.getElementById('periodBar').style.display='flex';

  var ps=all.filter(function(p){return inPeriod(p.d);});
  var k=kpis(ps);

  // Delta CA : seulement pertinent pour le mois en cours vs mois précédent.
  var deltaHtml='';
  if(period==='month'){
    var prev=caMois(1), curr=caMois(0);
    if(prev>0){ var pct=Math.round((curr-prev)/prev*100); var cls=pct>0?'pos':(pct<0?'neg':'flat'); var arr=pct>0?'▲':(pct<0?'▼':'=');
      deltaHtml='<div class="d '+cls+'">'+arr+' '+Math.abs(pct)+'% vs mois dernier</div>'; }
    else { deltaHtml='<div class="d flat">— vs mois dernier</div>'; }
  }

  var prest=topPrestations(ps), cli=topClients(ps), m=monthly(), dorm=dormants(60);

  var html='';
  // KPI
  html+='<div class="kpi-grid">'+
    '<div class="kpi"><div class="k">Chiffre d\'affaires</div><div class="v">'+eur0(k.ca)+'</div>'+deltaHtml+'</div>'+
    '<div class="kpi"><div class="k">Passages</div><div class="v">'+k.n+'</div></div>'+
    '<div class="kpi"><div class="k">Panier moyen</div><div class="v">'+eur(k.panier)+'</div></div>'+
    '<div class="kpi"><div class="k">Clients servis</div><div class="v">'+k.clients+'</div></div>'+
    '</div>';

  // Graphe 12 mois
  html+='<div class="panel"><div class="panel-title">Chiffre d\'affaires<span class="pt-sub">12 derniers mois</span></div>'+bars(m)+'</div>';

  // Top prestations
  prest.forEach(function(r){r._v=r.ca;});
  html+='<div class="panel"><div class="panel-title">Prestations les plus rentables<span class="pt-sub">sur la période</span></div>'+
    rankList(prest, function(r){return eur0(r.ca);}, function(r){return '×'+r.count;})+'</div>';

  // Top clients
  cli.forEach(function(r){r._v=r.ca;});
  html+='<div class="panel"><div class="panel-title">Meilleurs clients<span class="pt-sub">sur la période</span></div>'+
    rankList(cli, function(r){return eur0(r.ca);}, function(r){return r.count+(r.count>1?' visites':' visite');})+'</div>';

  // Clients en sommeil
  html+='<div class="panel"><div class="panel-title">Clients en sommeil<span class="pt-sub">+ de 60 jours</span></div>'+
    (dorm>0
      ? '<div style="display:flex;align-items:center;gap:.8rem"><div style="font-size:1.8rem;font-weight:800;color:#A22C29">'+dorm+'</div>'+
        '<div class="muted" style="text-align:left;padding:0;flex:1">client'+(dorm>1?'s ne sont':' n\'est')+' pas revenu'+(dorm>1?'s':'')+' depuis plus de 2 mois. '+
        '<a href="campagnes.html" style="color:#A22C29;font-weight:700;text-decoration:none">Lancer une relance →</a></div></div>'
      : '<div class="muted" style="padding:.2rem 0;text-align:left">Aucun client en sommeil : tout le monde est revenu récemment. 👍</div>')+'</div>';

  content.innerHTML=html;
}

// Sélecteur de période
document.getElementById('periodBar').addEventListener('click', function(e){
  var b=e.target.closest('.pbtn'); if(!b) return;
  period=b.getAttribute('data-p');
  Array.prototype.forEach.call(this.querySelectorAll('.pbtn'), function(x){ x.classList.toggle('on', x===b); });
  render();
});

if(window.DB){ DB.onStatus(function(msg,cls){ var el=document.getElementById('syncSt'); if(el) el.textContent=msg||''; }); DB.boot(function(){ render(); DB.startAutoSync(render); }); }
else { render(); }
</script>
<script>
(function(){
  var K="kut-theme";
  function cur(){try{return localStorage.getItem(K)==="dark"?"dark":"light";}catch(e){return "light";}}
  function apply(t){if(t==="dark")document.documentElement.setAttribute("data-theme","dark");else document.documentElement.removeAttribute("data-theme");}
  var SUN='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5Zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3Zm0-9a1 1 0 0 0 1-1V3a1 1 0 0 0-2 0v2a1 1 0 0 0 1 1Zm0 12a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-1-1ZM5.99 7.41a1 1 0 0 0 1.42-1.41l-1-1a1 1 0 0 0-1.42 1.41Zm11.6 9.18a1 1 0 0 0-1.42 1.42l1 1a1 1 0 0 0 1.42-1.42ZM21 11h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2ZM5 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h2a1 1 0 0 0 1-1Zm11.59-4.59a1 1 0 0 0 .7-.29l1-1a1 1 0 1 0-1.42-1.42l-1 1a1 1 0 0 0 .72 1.71ZM5.99 16.59l-1 1a1 1 0 1 0 1.42 1.42l1-1a1 1 0 0 0-1.42-1.42Z"/></svg>';
  var MOON='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M21.64 13a1 1 0 0 0-1.05-.14 8.05 8.05 0 0 1-3.37.73A8.15 8.15 0 0 1 9.08 5.49a8.59 8.59 0 0 1 .25-2A1 1 0 0 0 8 2.36 10.14 10.14 0 1 0 22 14.05a1 1 0 0 0-.36-1.05Zm-9.5 6.69A8.14 8.14 0 0 1 7.08 5.22v.27A10.15 10.15 0 0 0 17.19 15.6a9.79 9.79 0 0 0 2.1-.22 8.11 8.11 0 0 1-7.15 4.31Z"/></svg>';
  var b=document.createElement("button");b.id="themeToggle";b.type="button";b.className="theme-toggle";
  function refresh(){var d=cur()==="dark";b.innerHTML=d?SUN:MOON;var l=d?"Passer en mode clair":"Passer en mode sombre";b.setAttribute("aria-label",l);b.title=l;}
  b.addEventListener("click",function(){var t=cur()==="dark"?"light":"dark";try{localStorage.setItem(K,t);}catch(e){}apply(t);refresh();});
  apply(cur());refresh();var H=document.querySelector("header");(H||document.body).appendChild(b);
})();
</script>
</body>
</html>
